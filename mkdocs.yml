site_name: fastapi-foundation
site_description: External documentation site for fastapi-foundation
docs_dir: documents
site_dir: site

nav:
  - 首页: index.md
  - 快速开始: quickstart.md
  - 架构: architecture.md
  - 指南:
      - 快速上手清单: guides/quickstart-checklist.md
      - APP 开发: guides/app-development.md
  - API 约定:
      - 平台环境: api/api-environment.md
      - App 注册: api/app-registry.md
      - 租户隔离: api/tenant-isolation.md

theme:
  name: material
  language: zh

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.inlinehilite
